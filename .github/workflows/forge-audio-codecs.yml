name: Forge Audio Codecs (aarch64)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-audio-codecs:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cl-andro/package-builder:latest
      options: --privileged
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PAT }}
    steps:
      - name: Checkout Sovereign Code
        uses: actions/checkout@v7
      - name: Architect the Custom OS Directories
        run: |
          sudo mkdir -p /data/data/com.zk.clandro/files/usr
          sudo mkdir -p /data/data/com.zk.clandro/files/home
          sudo chown -R builder:builder /data/data/com.zk.clandro
      - name: Install the C++ Compiler (The Missing NDK)
        run: |
          export HOME=/home/builder
          ./scripts/setup-android-sdk.sh
      - name: Import GPG Key for Local Repo Verification
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          export HOME=/home/builder
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          else
            echo "GPG_PRIVATE_KEY not set, repo verification may fail"
          fi
      - name: Forge Audio Codecs
        run: |
          export HOME=/home/builder
          ./build-package.sh -a aarch64 ndk-sysroot
          ./build-package.sh -a aarch64 libc++
          ./build-package.sh -a aarch64 libmpg123
          ./build-package.sh -a aarch64 libmad
          ./build-package.sh -a aarch64 libtwolame
          ./build-package.sh -a aarch64 libsamplerate
          ./build-package.sh -a aarch64 speexdsp
          ./build-package.sh -a aarch64 libsoxr
      - name: Sanitize Artifact Filenames
        if: success()
        run: for f in output/*:*.deb; do if [ -e "$f" ]; then mv "$f" "$(echo $f | tr ':' '_')"; fi; done
      - name: The Autopsy
        if: failure()
        run: find /home/builder/.clandro-build/ -name "config.log" -exec cat {} + 2>/dev/null | tail -100
      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cl-andro-audio-codecs
          path: output/*.deb
      - name: Publish & Sign Packages
        if: success()
        env:
          CL_ANDRO_PAT: ${{ secrets.CL_ANDRO_PAT }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: ./scripts/publish-repo-ci.sh
