name: Forge Ccache + Binutils (aarch64)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ccache:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cl-andro/package-builder:latest
      options: --privileged
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PAT }}
    steps:
      - name: Checkout Sovereign Code
        uses: actions/checkout@v7

      - name: Architect the Custom OS Directories
        run: |
          sudo mkdir -p /data/data/com.zk.clandro/files/usr
          sudo mkdir -p /data/data/com.zk.clandro/files/home
          sudo chown -R builder:builder /data/data/com.zk.clandro

      - name: Install the C++ Compiler (The Missing NDK)
        run: |
          export HOME=/home/builder
          ./scripts/setup-android-sdk.sh

      - name: Forge Ccache + Binutils (Surgical Execution)
        run: |
          export HOME=/home/builder

          # Bedrock Dependencies
          ./build-package.sh -a aarch64 ndk-sysroot
          ./build-package.sh -a aarch64 libc++

          # 1. binutils — GNU binary utilities (objdump, objcopy, ar, etc.)
          ./build-package.sh -a aarch64 binutils

          # 2. libhiredis — C client library for Redis
          ./build-package.sh -a aarch64 libhiredis

          # 3. fmt — C++ formatting library
          ./build-package.sh -a aarch64 fmt

          # 4. ccache — Compiler cache for fast recompilation
          ./build-package.sh -a aarch64 ccache

      - name: Sanitize Artifact Filenames
        if: success()
        run: |
          for f in output/*:*.deb; do
            if [ -e "$f" ]; then
              new_name=$(echo "$f" | tr ':' '_')
              mv "$f" "$new_name"
            fi
          done

      - name: The Autopsy (Catch the Crash)
        if: failure()
        run: |
          echo "========== CONFIG.LOG AUTOPSY START =========="
          find /home/builder/.clandro-build/ -name "config.log" -exec cat {} +
          echo "========== CONFIG.LOG AUTOPSY END =========="

      - name: Upload Ccache + Binutils Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cl-andro-ccache
          path: output/*.deb

      - name: Publish & Sign Packages
        if: success()
        env:
          CL_ANDRO_PAT: ${{ secrets.CL_ANDRO_PAT }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          ./scripts/publish-repo-ci.sh
