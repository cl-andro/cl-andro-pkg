name: Forge Alpine XFCE (Mobile Desktop)

on:
  workflow_dispatch:
    inputs:
      alpine_version:
        description: 'Alpine Linux version'
        required: true
        default: '3.21'
      vnc_password:
        description: 'VNC password'
        required: false
        default: 'clusterauto'
      resolution:
        description: 'VNC resolution (WxH)'
        required: false
        default: '1080x2400'

permissions:
  contents: write

jobs:
  forge-alpine-xfce:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cl-andro/package-builder:latest
      options: --privileged
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PAT }}
    steps:
      - name: Checkout Sovereign Code
        uses: actions/checkout@v4

      - name: Architect the Build Directories
        run: |
          sudo mkdir -p /data/data/com.zk.clandro/files/usr
          sudo chown -R builder:builder /data/data/com.zk.clandro

      - name: Install qemu-user-static (for aarch64 binary emulation)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user-static

      - name: Forge Alpine XFCE Rootfs Tarball
        run: |
          export HOME=/home/builder
          chmod +x ./scripts/build-alpine-xfce-rootfs.sh
          ./scripts/build-alpine-xfce-rootfs.sh \
            --version "${{ github.event.inputs.alpine_version || '3.21' }}" \
            --vnc-pass "${{ github.event.inputs.vnc_password || 'clusterauto' }}" \
            --resolution "${{ github.event.inputs.resolution || '1080x2400' }}" \
            --output /tmp/alpine-xfce-rootfs

      - name: Package & Sign Rootfs Tarball
        run: |
          ALPINE_VER="${{ github.event.inputs.alpine_version || '3.21' }}"
          BUILD_DATE=$(date -u +%Y%m%d)
          ARTIFACT="alpine-xfce-aarch64-v${ALPINE_VER}-${BUILD_DATE}"

          sudo tar -czf "/tmp/${ARTIFACT}.tar.gz" -C /tmp/alpine-xfce-rootfs/root .
          sha256sum "/tmp/${ARTIFACT}.tar.gz" > "/tmp/${ARTIFACT}.tar.gz.sha256"

          # GPG sign tarball
          if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
            echo '${{ secrets.GPG_PRIVATE_KEY }}' | gpg --batch --import 2>/dev/null || true
            gpg --batch --yes --detach-sign \
              --output "/tmp/${ARTIFACT}.tar.gz.sig" \
              "/tmp/${ARTIFACT}.tar.gz" 2>/dev/null || true
          fi

          echo "artifact=${ARTIFACT}" >> $GITHUB_ENV
          echo "Tarball size:"
          du -sh "/tmp/${ARTIFACT}.tar.gz"

      - name: Build alpine-xfce-proot .deb manually
        run: |
          PKG_DIR=/tmp/deb-build/alpine-xfce-proot
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/data/data/com.zk.clandro/files/usr/etc/proot-distro"
          mkdir -p "${PKG_DIR}/data/data/com.zk.clandro/files/usr/bin"

          # Copy plugin + start script
          cp packages/alpine-xfce-proot/alpine-xfce.sh \
            "${PKG_DIR}/data/data/com.zk.clandro/files/usr/etc/proot-distro/alpine-xfce.sh"
          cp packages/alpine-xfce-proot/clandro-xfce-start \
            "${PKG_DIR}/data/data/com.zk.clandro/files/usr/bin/clandro-xfce-start"

          # Create control file
          cat > "${PKG_DIR}/DEBIAN/control" <<EOF
Package: alpine-xfce-proot
Version: 1.0.0-1
Architecture: all
Maintainer: @clandro
Depends: proot, proot-distro, bash, coreutils, clandro-tools
Description: Alpine Linux XFCE Mobile Desktop - PRoot distro integration
 Provides the proot-distro plugin and clandro-xfce-start script to
 run Alpine Linux with XFCE4 desktop and TigerVNC on Android via PRoot.
EOF

          # Create postinst
          cat > "${PKG_DIR}/DEBIAN/postinst" <<'POSTINST'
#!/bin/sh
set -e
echo ""
echo "========================================="
echo "  Alpine XFCE Mobile Desktop"
echo "========================================="
echo ""
echo "  Install rootfs:  proot-distro install alpine-xfce"
echo "  Or run:          clandro-xfce-start"
echo "  VNC: localhost:1 | Password: clusterauto"
echo "========================================="
echo ""
POSTINST

          chmod 755 "${PKG_DIR}/DEBIAN/postinst"
          chmod 644 "${PKG_DIR}/DEBIAN/control"
          chmod 755 "${PKG_DIR}/data/data/com.zk.clandro/files/usr/bin/clandro-xfce-start"

          # Build .deb
          mkdir -p /tmp/output
          dpkg-deb -b "${PKG_DIR}" "/tmp/output/alpine-xfce-proot_1.0.0-1_all.deb"
          echo "Built .deb:"
          ls -lh /tmp/output/*.deb

      - name: Copy artifacts to output/
        run: |
          mkdir -p output
          cp /tmp/output/*.deb output/ 2>/dev/null || true
          cp /tmp/${artifact}*.tar.gz output/ 2>/dev/null || true
          cp /tmp/${artifact}*.sha256 output/ 2>/dev/null || true
          cp /tmp/${artifact}*.sig output/ 2>/dev/null || true
          echo "Output:"
          ls -lh output/

      - name: Sanitize Artifact Filenames
        if: success()
        run: |
          for f in output/*:*.deb; do
            if [ -e "$f" ]; then
              new_name=$(echo "$f" | tr ':' '_')
              mv "$f" "$new_name"
            fi
          done

      - name: Upload Artifacts (.deb + Tarball)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: alpine-xfce-aarch64
          path: output/*

      - name: Publish .deb to APT Repo
        if: success()
        env:
          CL_ANDRO_PAT: ${{ secrets.CL_ANDRO_PAT }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          # Only .deb files for the apt repo
          mkdir -p repo-debs
          cp output/*.deb repo-debs/ 2>/dev/null || true
          if [ -n "$(ls -A repo-debs/ 2>/dev/null)" ]; then
            ./scripts/publish-repo-ci.sh
          else
            echo "No .deb files to publish to apt repo"
          fi

      - name: Publish Tarball to GitHub Releases
        if: success() && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="alpine-xfce-${artifact}"
          FILES=()
          for f in /tmp/${artifact}*.tar.gz /tmp/${artifact}*.sha256 /tmp/${artifact}*.sig; do
            [ -f "$f" ] && FILES+=("$f")
          done

          # Delete existing tag if any (for re-runs)
          gh release delete "$TAG" --yes 2>/dev/null || true

          gh release create "$TAG" \
            "${FILES[@]}" \
            --title "Alpine XFCE Mobile Desktop ${artifact}" \
            --notes "Alpine ${{ github.event.inputs.alpine_version || '3.21' }} XFCE4 rootfs for cl-andro PRoot.

        Install:
            pkg install alpine-xfce-proot
            proot-distro install alpine-xfce
            clandro-xfce-start

        VNC: localhost:1 | Password: ${{ github.event.inputs.vnc_password || 'clusterauto' }}
        Resolution: ${{ github.event.inputs.resolution || '1080x2400' }}
        " || echo "Release creation skipped (not on main branch?)"

      - name: The Autopsy (Catch the Crash)
        if: failure()
        run: |
          echo "========== CRASH LOG =========="
          ls -la /tmp/alpine-xfce-rootfs/ 2>/dev/null || echo "No rootfs dir"
          ls -la /tmp/alpine-xfce-rootfs/root/ 2>/dev/null || echo "No root dir"
          cat /tmp/alpine-xfce-rootfs/build.log 2>/dev/null || echo "No build log"
          ls -la /tmp/output/ 2>/dev/null || echo "No output"
