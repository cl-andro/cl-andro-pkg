name: Build & Push Package Builder Image

on:
  push:
    branches: [main]
    paths:
      - 'scripts/Dockerfile'
      - 'scripts/setup-*.sh'
      - 'scripts/properties.sh'
      - 'scripts/build/termux_download.sh'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        run: |
          docker build --tag cl-andro/package-builder:latest scripts/
          docker tag cl-andro/package-builder:latest ghcr.io/cl-andro/package-builder:latest

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          docker push ghcr.io/cl-andro/package-builder:latest
