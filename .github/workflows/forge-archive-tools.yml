name: Forge Archive Tools (aarch64)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-archive-tools:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cl-andro/package-builder:latest
      options: --privileged
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PAT }}
    steps:
      - name: Checkout Sovereign Code
        uses: actions/checkout@v4

      - name: Architect the Custom OS Directories
        run: |
          sudo mkdir -p /data/data/com.zk.clandro/files/usr
          sudo mkdir -p /data/data/com.zk.clandro/files/home
          sudo chown -R builder:builder /data/data/com.zk.clandro

      - name: Install the C++ Compiler (The Missing NDK)
        run: |
          export HOME=/home/builder
          ./scripts/setup-android-sdk.sh

      - name: Import GPG Key for Local Repo Verification
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          export HOME=/home/builder
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          else
            echo "GPG_PRIVATE_KEY not set, repo verification may fail"
          fi

      - name: Forge Archive Tools (Surgical Execution)
        run: |
          export HOME=/home/builder

          # Bedrock Dependencies (no deps to download)
          ./build-package.sh -a aarch64 ndk-sysroot
          ./build-package.sh -a aarch64 libc++

          # Compression library dependencies (no deps)
          ./build-package.sh -a aarch64 -i liblzo
          ./build-package.sh -a aarch64 -i lzlib

          # Archive utilities
          ./build-package.sh -a aarch64 -i zip
          ./build-package.sh -a aarch64 -i unzip
          ./build-package.sh -a aarch64 -i p7zip
          ./build-package.sh -a aarch64 -i unrar
          ./build-package.sh -a aarch64 -i cabextract
          ./build-package.sh -a aarch64 -i lzop
          ./build-package.sh -a aarch64 -i lzip
          ./build-package.sh -a aarch64 -i plzip
          ./build-package.sh -a aarch64 -i pigz
          ./build-package.sh -a aarch64 -i zpaq
          ./build-package.sh -a aarch64 -i lrzip

      - name: Sanitize Artifact Filenames
        if: success()
        run: |
          for f in output/*:*.deb; do
            if [ -e "$f" ]; then
              new_name=$(echo "$f" | tr ':' '_')
              mv "$f" "$new_name"
            fi
          done

      - name: The Autopsy (Catch the Crash)
        if: failure()
        run: |
          echo "========== CONFIG.LOG AUTOPSY START =========="
          find /home/builder/.clandro-build/ -name "config.log" -exec cat {} +
          echo "========== CONFIG.LOG AUTOPSY END =========="

      - name: Upload Archive Tools Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cl-andro-archive-tools
          path: output/*.deb

      - name: Publish & Sign Packages
        if: success()
        env:
          CL_ANDRO_PAT: ${{ secrets.CL_ANDRO_PAT }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          ./scripts/publish-repo-ci.sh
