name: Forge Coreutils (Surgical Strike)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-coreutils:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cl-andro/package-builder:latest
      options: --privileged
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PAT }}
    steps:
      - name: Checkout Sovereign Code
        uses: actions/checkout@v7

      - name: Architect the Custom OS Directories
        run: |
          sudo mkdir -p /data/data/com.zk.clandro/files/usr
          sudo chown -R builder:builder /data/data/com.zk.clandro

      - name: Install NDK
        run: |
          export HOME=/home/builder
          ./scripts/setup-android-sdk.sh

      - name: Forge Bedrock & Coreutils
        run: |
          export HOME=/home/builder
          
          # The COMPLETE Compiler Bedrock
          ./build-package.sh -I -a aarch64 ndk-sysroot
          ./build-package.sh -I -a aarch64 libandroid-support
          ./build-package.sh -I -a aarch64 libandroid-glob
          ./build-package.sh -I -a aarch64 libiconv
          ./build-package.sh -I -a aarch64 libgmp
          ./build-package.sh -I -a aarch64 pcre2
          ./build-package.sh -I -a aarch64 libandroid-selinux
          
          # Crypto deps needed by coreutils
          ./build-package.sh -I -a aarch64 zlib
          ./build-package.sh -I -a aarch64 openssl
          
          # The Master Binary
          ./build-package.sh -I -a aarch64 coreutils

      - name: The Autopsy (Catch the Crash)
        if: failure()
        run: |
          echo "========== CONFIG.LOG AUTOPSY START =========="
          cat /home/builder/.clandro-build/coreutils/build/config.log
          echo "========== CONFIG.LOG AUTOPSY END =========="

      - name: Sanitize filenames
        if: success()
        run: |
          for f in output/*:*.deb; do
            [ -e "$f" ] && mv "$f" "$(echo "$f" | tr ':' '_')"
          done

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cl-andro-coreutils
          path: output/*.deb

      - name: Publish & Sign
        if: success()
        env:
          CL_ANDRO_PAT: ${{ secrets.CL_ANDRO_PAT }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          ./scripts/publish-repo-ci.sh
